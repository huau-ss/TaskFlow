name: taskflow_mobile
description: Recording-driven task collaboration mobile app
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  record: ^7.1.0
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  dio: ^5.7.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  file_picker: ^8.1.6
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
