services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
      POSTGRES_DB: taskflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://taskflow:taskflow@postgres:5432/taskflow
      DATABASE_URL_SYNC: postgresql://taskflow:taskflow@postgres:5432/taskflow
      REDIS_URL: redis://redis:6379/0
      NAS_PATH: /home/admin/nas/meetings/audios
    volumes:
      - ./backend:/app
      - nas_data:/mnt/nas/meetings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://taskflow:taskflow@postgres:5432/taskflow
      DATABASE_URL_SYNC: postgresql://taskflow:taskflow@postgres:5432/taskflow
      REDIS_URL: redis://redis:6379/0
      NAS_PATH: /home/admin/nas/meetings/audios
      FUNASR_URL: http://funasr:8005
    volumes:
      - ./backend:/app
      - nas_data:/mnt/nas/meetings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # FunASR 统一语音服务 (ASR + 说话人分离 + CAM++ embedding)
  # 注意：Docker Hub 不可达时，手动在宿主机启动：
  #   cd funasr_service && ./venv/bin/python3.11 -m uvicorn main:app --host 0.0.0.0 --port 8005
  funasr:
    build:
      context: ./funasr_service
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      OMP_NUM_THREADS: 4
      MKL_NUM_THREADS: 4
    volumes:
      - funasr_models:/app/models
      - funasr_cache:/root/.cache/modelscope
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 10G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  postgres_data:
  nas_data:
  funasr_models:
  funasr_cache:
